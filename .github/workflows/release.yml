name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Go Setup
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o adpki-ca ./cmd/ca-server

      - name: Package
        run: |
          tar -czf ad-pki-ca.tar.gz adpki-ca
          sha256sum ad-pki-ca.tar.gz > SHA256SUMS

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ad-pki-ca.tar.gz
            SHA256SUMS